name: sentinel_ai
description: Sentinel AI — Digital Media Protection Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Navigation
  go_router: ^13.0.0
  
  # State Management
  flutter_riverpod: ^2.5.1
  
  # Fonts
  google_fonts: ^6.2.1
  
  # Icons
  phosphor_flutter: ^2.1.0
  
  # Animations
  flutter_animate: ^4.5.0
  
  # HTTP Client (for later backend wiring)
  dio: ^5.4.3
  
  # File handling (for later upload wiring)
  file_picker: ^8.0.0+1
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
